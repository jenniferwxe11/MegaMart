---
name: CI/CD MegaMart

on:
  push:
    branches:
      - feature/**
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DBT_PROFILES_DIR: ./dbt_profiles
  DBT_TARGET: ci

jobs:
  # --- CHANGE DETECTION ---
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      dbt: ${{ steps.filter.outputs.dbt }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
            dbt:
              - 'models/**'
              - 'seeds/**'
              - 'snapshots/**'
              - 'dbt_project.yml'

  # --- CI ---
  ci:
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 20
    if: needs.changes.outputs.python == 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        uses: tj-actions/changed-files@v44

      - name: Show changed files
        run: |
          echo "${{ steps.changes.outputs.all_changed_files }}"

      - name: Debug changed files
        run: |
          echo "Changed files:"
          echo "${{ steps.changes.outputs.all_changed_files }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11


      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.in', 'requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pip-tools
          pip install -r requirements.txt

      - name: Validate requirements.txt
        run: |
          pip-compile requirements.in --quiet
          git diff --exit-code requirements.txt

      - name: Run pre-commit hooks (lint, format)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Security scan (dependencies)
        run: pip-audit

      - name: Security scan (code)
        run: |
          FILES="${{ steps.changes.outputs.all_changed_files }}"

          PY_FILES=$(echo "$FILES" | tr ' ' '\n' | grep '\.py$' || true)

          if [ -z "$PY_FILES" ]; then
            echo "No Python changes → skipping bandit"
            exit 0
          fi

          echo "$PY_FILES" | xargs -r bandit -c .bandit

      - name: Install Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan for secrets (gitleaks)
        run: gitleaks detect --source . --exit-code 2 --redact

      - name: Generate raw data
        run: |
          python -m data_generation.generation_runner

      - name: Run tests (smart selection)
        run: |
          FILES="${{ steps.changes.outputs.all_changed_files }}"

          TEST_FILES=$(echo "$FILES" | tr ' ' '\n' | grep -E '_test\.py|test_.*\.py' || true)

          if [ -z "$TEST_FILES" ]; then
            echo "No test files changed → running full suite"
            pytest
          else
            echo "Running impacted tests"
            echo "$TEST_FILES" | xargs -r pytest
          fi

    # --- DBT ---
  dbt:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.dbt == 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get changed files
        id: changes
        uses: tj-actions/changed-files@v44

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.in', 'requirements.txt') }}

      - name: Install dbt
        run: |
          pip install --upgrade pip
          pip install pip-tools
          pip install -r requirements.txt

      - name: dbt dependencies
        run: dbt deps

      - name: Download previous artifacts (state)
        uses: actions/download-artifact@v4
        with:
          name: dbt-target
        continue-on-error: true

      - name: dbt build (smart file-aware)
        run: |
          FILES="${{ steps.changes.outputs.all_changed_files }}"

          DBT_FILES=$(echo "$FILES" | tr ' ' '\n' | grep -E 'models/|seeds/|snapshots/' || true)

          if [ -z "$DBT_FILES" ]; then
            echo "No dbt-relevant changes → skipping dbt"
            exit 0
          fi

          if [ -f "target/manifest.json" ]; then
            dbt build --select state:modified+ --state target/
          else
            dbt build
          fi

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-target
          path: target/

      - name: Upload dbt logs
        uses: actions/upload-artifact@v4
        with:
          name: dbt-logs
          path: logs/

  # --- DEPLOY DBT DOCS ---
  deploy-dbt-docs:
    runs-on: ubuntu-latest
    needs: [ci,dbt]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud Platform
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: projects/594876062374/locations/global/workloadIdentityPools/mega-mart-pool/providers/github
          service_account: mega-mart-service@mega-mart-storage.iam.gserviceaccount.com

      - name: Verify authentication
        run: gcloud auth list

      - name: Generate dbt docs
        run: dbt docs generate --profiles-dir ./dbt_profiles

      - name: Authenticate gsutil
        run: gcloud config set project mega-mart-storage

      - name: Deploy dbt docs to Google Cloud Storage
        run: |
          gcloud storage cp -r target/* gs://mega-mart/dbt_docs/ --project=mega-mart-storage

      - name: Create tag
        run: |
          git tag v1.${{ github.run_number }}
          git push origin v1.${{ github.run_number }}
